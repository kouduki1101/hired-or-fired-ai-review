[project]
name = "aios-core"
version = "0.1.0"
description = "AIOS domain core: pure-function metrics, policies, and lineage (no I/O)"
requires-python = ">=3.11"
dependencies = ["numpy>=1.26"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aios_core"]
