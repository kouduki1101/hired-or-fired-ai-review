# AIOS スキーマ管理(本番経路)。開発・テスト用の create_all は schema.py を参照。
# URL は環境変数 AIOS_ALEMBIC_URL(同期ドライバ)で与える。例:
#   sqlite:///./aios.db
#   postgresql+psycopg://aios:aios@localhost:5432/aios
[alembic]
script_location = %(here)s/migrations
prepend_sys_path = .

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
