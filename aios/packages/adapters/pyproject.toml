[project]
name = "aios-adapters"
version = "0.1.0"
description = "AIOS Model Adapter SPI and bundled implementations"
requires-python = ">=3.11"
dependencies = ["numpy>=1.26", "aios-core"]

[tool.uv.sources]
aios-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aios_adapters"]
