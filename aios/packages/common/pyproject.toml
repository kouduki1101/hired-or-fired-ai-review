[project]
name = "aios-common"
version = "0.1.0"
description = "AIOS cross-cutting: settings, errors, structured logging"
requires-python = ">=3.11"
dependencies = ["pydantic>=2.9", "pydantic-settings>=2.6"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aios_common"]
