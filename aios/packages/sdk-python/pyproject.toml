[project]
name = "aios-sdk"
version = "0.1.0"
description = "AIOS Python SDK - multi-agent population operations platform client"
requires-python = ">=3.11"
dependencies = ["httpx>=0.27"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aios_sdk"]
