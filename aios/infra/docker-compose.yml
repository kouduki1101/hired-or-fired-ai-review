# AIOS 評価用スタック(P0)。本番はHelm Chart(P4)を使用する。
name: aios

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: aios
      POSTGRES_PASSWORD: aios
      POSTGRES_DB: aios
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aios"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: aios
      MINIO_ROOT_PASSWORD: aios-secret
    ports: ["9000:9000", "9001:9001"]
    volumes: [miniodata:/data]

  dashboard:
    build:
      context: ../apps/dashboard
    environment:
      NEXT_PUBLIC_AIOS_API: http://localhost:8080
    ports: ["3000:3000"]
    depends_on: [api]

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    environment:
      AIOS_DATABASE_URL: postgresql+asyncpg://aios:aios@postgres:5432/aios
      AIOS_REDIS_URL: redis://redis:6379/0
      AIOS_OBJECT_STORE_ENDPOINT: http://minio:9000
    ports: ["8080:8080"]
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  miniodata:
