apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aios.fullname" . }}-api
  labels:
    {{- include "aios.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "aios.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "aios.labels" . | nindent 8 }}
        app.kubernetes.io/component: api
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "aios.serviceAccountName" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.image.registry }}/{{ .Values.image.api.repository }}:{{ .Values.image.api.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
          env:
            - name: AIOS_CORS_ORIGINS
              value: {{ .Values.api.corsOrigins | quote }}
            - name: AIOS_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "aios.secretName" . }}
                  key: databaseUrl
                  optional: true
            - name: AIOS_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: {{ include "aios.secretName" . }}
                  key: apiKeys
                  optional: true
            {{- if .Values.api.otlpEndpoint }}
            - name: AIOS_OTEL_OTLP_ENDPOINT
              value: {{ .Values.api.otlpEndpoint | quote }}
            {{- end }}
            {{- if .Values.api.autopilotIntervalSeconds }}
            - name: AIOS_AUTOPILOT_INTERVAL_SECONDS
              value: {{ .Values.api.autopilotIntervalSeconds | quote }}
            {{- end }}
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aios.fullname" . }}-api
  labels:
    {{- include "aios.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  selector:
    app.kubernetes.io/name: {{ include "aios.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 80
      targetPort: http
