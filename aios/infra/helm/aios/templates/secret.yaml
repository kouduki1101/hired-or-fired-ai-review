{{- if not .Values.api.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aios.fullname" . }}
  labels:
    {{- include "aios.labels" . | nindent 4 }}
type: Opaque
stringData:
  databaseUrl: {{ .Values.api.databaseUrl | quote }}
  apiKeys: {{ .Values.api.apiKeys | quote }}
{{- end }}
