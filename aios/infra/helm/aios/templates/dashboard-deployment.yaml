{{- if .Values.dashboard.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aios.fullname" . }}-dashboard
  labels:
    {{- include "aios.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  replicas: {{ .Values.dashboard.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "aios.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: dashboard
  template:
    metadata:
      labels:
        {{- include "aios.labels" . | nindent 8 }}
        app.kubernetes.io/component: dashboard
    spec:
      serviceAccountName: {{ include "aios.serviceAccountName" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: dashboard
          image: "{{ .Values.image.registry }}/{{ .Values.image.dashboard.repository }}:{{ .Values.image.dashboard.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.dashboard.port }}
          env:
            - name: NEXT_PUBLIC_AIOS_API
              value: {{ .Values.dashboard.publicApiUrl | quote }}
          livenessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            {{- toYaml .Values.dashboard.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aios.fullname" . }}-dashboard
  labels:
    {{- include "aios.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  selector:
    app.kubernetes.io/name: {{ include "aios.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: dashboard
  ports:
    - name: http
      port: 80
      targetPort: http
{{- end }}
