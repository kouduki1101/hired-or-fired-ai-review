name: aios-ci

on:
  push:
    paths: ["aios/**", ".github/workflows/aios-ci.yml"]
  pull_request:
    paths: ["aios/**", ".github/workflows/aios-ci.yml"]

defaults:
  run:
    working-directory: aios

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Sync dependencies
        run: uv sync
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Unit & contract tests
        run: uv run pytest -q
